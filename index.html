<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- CRITICAL: This exact viewport tag must match the app's tag to trigger your mobile CSS inside the iframe -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Time Tracker</title>
    
    <style>
        /* Reset all margins and prevent the parent page from scrolling */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f9fafb; /* Matches your 'All' theme background to prevent flashing during load */
            -webkit-overflow-scrolling: touch;
        }

        .iframe-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <!-- Replace the src URL with your published Google Apps Script Web App URL -->
        <iframe 
            src="https://script.google.com/macros/s/AKfycbxoCUiIzmEIw8MBbCK9YMsnJZPggX4fOGcfQOei1tp4Ob7q57ixzKVm9cOhSJWiIZi4/exec" 
            allowfullscreen="true"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
            allow="geolocation"
            title="Time Tracker App">
        </iframe>
    </div>

</body>
</html>
