<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Oakwood Time Tracker</title>
    
    <style>
        /* Reset all margins and prevent the parent page from scrolling */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f9fafb; /* Matches your 'All' theme background to prevent flashing during load */
            -webkit-overflow-scrolling: touch;
        }

        .iframe-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        iframe {
            border: none;
            width: 100%;
            
            /* --- THE BANNER HACK --- */
            /* Pushes the iframe up to hide the Google banner. Adjust the -36px if it doesn't fully clear the banner on your specific device. */
            margin-top: 0px; 
            height: calc(100% + 0px); 
            
            /* If the touch targets on your mobile device get misaligned, DELETE the two lines above and use this instead:
            height: 100%; 
            margin-top: 0;
            */
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbwbdwQlduJ1Y9IAn2qPHwyxkx1v2m6v1R250O9OcDv-4DR5-nOnW7wXXtwQFDhrR0Y7/exec" 
            allowfullscreen="true"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
            title="Time Tracker App">
        </iframe>
    </div>

</body>
</html>
